<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Depan</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f0;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-title {
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    color: #4a7c3f;
    letter-spacing: 1px;
  }
  .btn-download {
    background: #4a7c3f;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #3d6835; }

  /* Layout sesuai wireframe depan */
  .grid-depan {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  /* Freezer I: lebar penuh (kotak horizontal atas) */
  .freezer-card-wide {
    background: #d6ddb8;
    border-radius: 18px;
    padding: 24px 28px;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.3s;
  }

  /* Freezer J: vertikal kiri bawah */
  .freezer-card-tall {
    background: #d6ddb8;
    border-radius: 18px;
    padding: 24px 28px;
    min-height: 320px;
    width: 55%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.3s;
  }

  .freezer-card-wide.mati,
  .freezer-card-tall.mati {
    background: #c8cdb0;
  }

  .f-name {
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    color: #4a5c3a;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .f-info {
    font-size: 22px;
    font-weight: 900;
    color: #3a4a35;
    line-height: 1.3;
  }
  .f-update {
    font-size: 12px;
    color: #6a7a60;
    margin-top: 8px;
    font-weight: 600;
  }
  .f-mati {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    color: #5a4a40;
    text-align: center;
  }
  .f-empty {
    font-size: 14px;
    color: #aab09a;
    font-weight: 600;
    font-style: italic;
  }

  .last-refresh {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">DEPAN</div>
  <button class="btn-download" onclick="downloadPNG()">📥 Download PNG</button>
</div>

<div id="displayArea">
  <div class="grid-depan">
    <!-- Freezer I: lebar penuh -->
    <div class="freezer-card-wide" id="card-I">
      <div class="f-name">FREEZER I</div>
      <div class="f-empty">Belum ada data</div>
    </div>

    <!-- Freezer J: vertikal -->
    <div class="freezer-card-tall" id="card-J">
      <div class="f-name">FREEZER J</div>
      <div class="f-empty">Belum ada data</div>
    </div>
  </div>
</div>

<div class="last-refresh" id="lastRefresh">Memuat data...</div>

<script>
const SUPABASE_URL = 'https://rfcyibaarczhfhqqxmcj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY3lpYmFhcmN6aGZocXF4bWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjY1OTMsImV4cCI6MjA5MzEwMjU5M30.ZU_c3fKKZF00G0lcCDhw_A5NYDzRwR9eetoFR4_vh1k';

function formatDate(isoStr) {
  if (!isoStr) return '-';
  const d = new Date(isoStr);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm} | ${hh}:${min}`;
}

function renderCard(id, data) {
  const card = document.getElementById('card-' + id);
  if (!card) return;

  if (!data || !data.updated_at) {
    card.classList.remove('mati');
    card.innerHTML = `<div class="f-name">FREEZER ${id}</div><div class="f-empty">Belum ada data</div>`;
    return;
  }

  if (data.status === 'off') {
    card.classList.add('mati');
    card.innerHTML = `
      <div class="f-name">FREEZER ${id}</div>
      <div class="f-mati">MATI</div>
      <div class="f-update">(Last Update ${formatDate(data.updated_at)})</div>`;
  } else {
    card.classList.remove('mati');
    card.innerHTML = `
      <div class="f-name">FREEZER ${id}</div>
      <div class="f-info">${data.suhu ? data.suhu + '° | ' : ''}${data.isi || '-'}</div>
      <div class="f-update">(Last Update ${formatDate(data.updated_at)})</div>`;
  }
}

async function fetchData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/freezers?id=in.(I,J)&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    data.forEach(row => renderCard(row.id, row));
    document.getElementById('lastRefresh').textContent = 'Refresh otomatis tiap 30 detik · ' + new Date().toLocaleTimeString('id-ID');
  } catch(e) {
    document.getElementById('lastRefresh').textContent = 'Gagal memuat data.';
  }
}

function downloadPNG() {
  const area = document.getElementById('displayArea');
  html2canvas(area, { backgroundColor: '#f5f5f0', scale: 2 }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'freezer-depan-' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
